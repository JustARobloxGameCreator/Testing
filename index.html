<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprunki Shop</title>
</head>
<body>
    <h1>Sprunki Shop</h1>
    <p>Welcome to the Sprunki Shop!</p>

    <div id="output"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const { createClient } = supabase

        const client = createClient(
            'https://kgnqowborkiylzdrytml.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnbnFvd2JvcmtpeWx6ZHJ5dG1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzU0MjEsImV4cCI6MjA5MDU1MTQyMX0.W1SvJBg1Z9L6UxfPDK85OK2tzNcSAKmLz43_W0WGboo'
        )

        async function loadData() {
            const { data, error } = await client
                .from('Sprunkis')
                .select('id, Name, qtd, price')

            const output = document.getElementById('output')

            if (error) {
                console.error(error)
                if (output) {
                    output.textContent = 'Error loading products. Please try again later.'
                }
                return
            }

            if (!output) {
                console.error('Output element not found')
                return
            }

            output.innerHTML = ''

            data.forEach(item => {
                const container = document.createElement('div')

                const title = document.createElement('h2')
                title.textContent = item.Name
                container.appendChild(title)

                const qtyParagraph = document.createElement('p')
                qtyParagraph.textContent = 'Amount available: ' + item.qtd
                container.appendChild(qtyParagraph)

                const priceParagraph = document.createElement('p')
                priceParagraph.textContent = 'Price: ' + item.price
                container.appendChild(priceParagraph)

                const button = document.createElement('button')
                button.textContent = 'Buy'
                button.addEventListener('click', function() {
                    alert('You bought ' + item.Name + '!')
                })
                container.appendChild(button)

                output.appendChild(container)

                const hr = document.createElement('hr')
                output.appendChild(hr)
            })
        }

        loadData()
    </script>
</body>
</html>
